<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f5f0eb"/>
      <stop offset="100%" stop-color="#e8ddd3"/>
    </linearGradient>
    <linearGradient id="paw" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#d4c0a8"/>
      <stop offset="100%" stop-color="#c4ad91"/>
    </linearGradient>
  </defs>

  <rect width="400" height="300" fill="url(#bg)"/>

  <g transform="translate(200, 130)" opacity="0.45">
    <!-- Paw pad main -->
    <ellipse cx="0" cy="16" rx="28" ry="24" fill="url(#paw)"/>
    <!-- Toes -->
    <ellipse cx="-22" cy="-12" rx="11" ry="14" fill="url(#paw)" transform="rotate(-12 -22 -12)"/>
    <ellipse cx="-7" cy="-22" rx="10" ry="13" fill="url(#paw)" transform="rotate(-4 -7 -22)"/>
    <ellipse cx="9" cy="-22" rx="10" ry="13" fill="url(#paw)" transform="rotate(4 9 -22)"/>
    <ellipse cx="23" cy="-11" rx="11" ry="14" fill="url(#paw)" transform="rotate(12 23 -11)"/>
  </g>

  <text x="200" y="205" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#b8a590" letter-spacing="0.5">
    Фото скоро появится
  </text>
</svg>
